services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonomous-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SANDBOX_URL=http://sandbox:8001
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_started
      sandbox:
        condition: service_started
    volumes:
      - ./workspace:/app/workspace
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: code-sandbox
    ports:
      - "8001:8001"
    networks:
      - agent-net
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=256m,noexec
    mem_limit: 512m
    cpus: "1.0"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8002:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - agent-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - agent-net
    restart: unless-stopped

networks:
  agent-net:
    driver: bridge

volumes:
  chroma-data:
    driver: local
